name: my_gastos_app
description: Controle de gastos mensais com categorias, notificações, calendário e gráficos.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Plugin atualizado — compatível com Android atual
  flutter_local_notifications: ^17.0.0-beta.4

  flutter_riverpod: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.0.1
  fl_chart: ^0.66.0
  table_calendar: ^3.0.9
  intl: ^0.18.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
